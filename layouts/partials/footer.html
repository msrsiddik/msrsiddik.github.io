<footer class="site-footer">
  <div class="container footer-inner">
    <p>© {{ now.Year }} {{ .Site.Params.author }}. {{ i18n "footer_built" }}</p>
    <div class="socials">
      {{ with .Site.Params.github }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>{{ end }}
      {{ with .Site.Params.linkedin }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a>{{ end }}
      {{ with .Site.Params.twitter }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="Twitter">Twitter</a>{{ end }}
      {{ with .Site.Params.facebook }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="Facebook">Facebook</a>{{ end }}
    </div>
  </div>
</footer>
