# Steps shown in the "How I Work" pipeline on the home page.
# `details` is the extra content revealed when a step is clicked/expanded.
- title: "Requirements"
  icon: "requirements"
  desc: "Understand the problem, the users, and what success looks like before writing any code."
  details: "Talk to stakeholders, map the core workflows, and write down what \"done\" actually means — scope, constraints, and edge cases up front."
- title: "Design"
  icon: "design"
  desc: "Sketch the architecture and data flow, and decide the trade-offs up front."
  details: "Service boundaries, data models, and API contracts on paper first. For client work this is where POS/healthcare-specific rules (offline-first, multi-tenant, compliance) get decided."
- title: "Development"
  icon: "development"
  desc: "Build in small, testable increments — working software over big-bang releases."
  details: "Go and Java/Spring Boot on the backend, React on the frontend, feature branches with small reviewable PRs — nothing sits unmerged for long."
- title: "Testing"
  icon: "testing"
  desc: "Unit and integration tests, plus manual QA on real workflows before anything ships."
  details: "Automated tests where they earn their keep, plus manually walking through the actual user flow — not just the happy path."
- title: "Deployment"
  icon: "deployment"
  desc: "Ship through CI/CD with monitoring in place, so issues surface before users notice."
  details: "Docker images, CI/CD pipelines (GitHub Actions), staged rollouts, and metrics/tracing wired in from day one — not bolted on after an incident."
- title: "Handover & Support"
  icon: "handover"
  desc: "Documentation, a walkthrough, and continued support after launch — not a drop-and-run."
  details: "Setup docs, a live walkthrough with the team, and staying reachable after launch for bug fixes and small follow-up requests."
