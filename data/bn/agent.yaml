# Scripted agent conversation that drives the hero animation.
# `render` maps the answer to a web-view block (name | role | stack | status).
- q: "আপনি কে?"
  a: "আমি সিদ্দিকুর রহমান, বাংলাদেশ থেকে একজন ফুল-স্ট্যাক ডেভেলপার।"
  render: name
- q: "আপনি কী করেন?"
  a: "এন্ড-টু-এন্ড প্রোডাক্ট বানাই — ব্যাকএন্ড থেকে ফ্রন্টএন্ড পর্যন্ত। মূল টুল Go, Java/Spring Boot আর React।"
  render: role
- q: "আপনার স্ট্যাকটা দেখান।"
  a: "আচ্ছা — এই যে, প্রতিদিন যা নিয়ে ঘাঁটাঘাঁটি করি।"
  render: stack
- q: "আপনি কি available?"
  a: "হ্যাঁ, নতুন কাজের জন্য open আছি। কথা বলা যাক।"
  render: status
