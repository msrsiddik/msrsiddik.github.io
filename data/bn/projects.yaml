# Bengali version — github.com/msrsiddik থেকে আসল প্রজেক্ট। featured: true মানে উপরে দেখাবে।
- name: "ApiCoreX"
  description: "একটা stateless, multi-tenant API gateway — সাথে language-agnostic HTTP plugin সিস্টেম। কোর অংশটা JWT auth, রাউটিং, স্ট্রিমিং (ফাইল আপলোড, SSE, WebSocket) আর resilience (circuit breaker, rate limiting, bulkhead) সামলায়, বাকি business logic থাকে plugin-এ — যেকোনো ভাষায় লেখা যায়। Prometheus metrics আর OpenTelemetry tracing-ও যোগ করা আছে।"
  tech: ["Go", "JWT", "Redis", "Prometheus", "OpenTelemetry"]
  repo: "https://github.com/msrsiddik/apicorex"
  featured: true

- name: "ApiCoreX Identity"
  description: "ApiCoreX-এর authentication আর tenant-management plugin। নিজস্ব PostgreSQL ডেটাবেস আছে, HS256 access আর rotating refresh token issue করে, প্রতিটা tenant-এর জন্য আলাদা schema বানাতে একটা compensating saga চালায়। Multi-tenant account সাপোর্ট করে — একটা credential দিয়ে একাধিক tenant, সাথে Redis-backed logout।"
  tech: ["Go", "Gin", "PostgreSQL", "JWT", "Redis"]
  repo: "https://github.com/msrsiddik/apicorex-identity"
  featured: true

- name: "ApiCoreX Sync"
  description: "ApiCoreX-এর offline-first data sync plugin। কোনো custom sync logic ছাড়াই যেকোনো offline অ্যাপ local change push আর server change pull করতে পারে এটা দিয়ে। Idempotent change batch, monotonic server cursor, last-write-wins conflict resolution, আর soft-delete tombstone — সবই আছে।"
  tech: ["Go", "PostgreSQL", "Offline-first"]
  repo: "https://github.com/msrsiddik/apicorex-sync"
  featured: true

