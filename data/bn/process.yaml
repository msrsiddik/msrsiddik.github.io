# Steps shown in the "How I Work" pipeline on the home page.
# `details` is the extra content revealed when a step is clicked/expanded.
- title: "Requirements"
  icon: "requirements"
  desc: "Code lekhar age problem-ta, user der, ar success ki dekhte seta bhalo moto bujhe newa."
  details: "Stakeholder der sathe kotha bola, core workflow map kora, ar \"done\" mane ki seta likhe rakha — scope, constraint, edge case shuru theyi thik kore newa."
- title: "Design"
  icon: "design"
  desc: "Architecture ar data flow sketch kora, shuru theyi trade-off gulo thik kore newa."
  details: "Service boundary, data model, API contract age kagoje thik kora. Client project e ei jaygay-i POS/healthcare-specific rules (offline-first, multi-tenant, compliance) decide hoy."
- title: "Development"
  icon: "development"
  desc: "Choto choto testable increment-e build kora — big-bang release na kore kaj kora software-e focus."
  details: "Backend-e Go ar Java/Spring Boot, frontend-e React, choto choto reviewable PR soho feature branch — kono kichu onek din merge chara pore thake na."
- title: "Testing"
  icon: "testing"
  desc: "Unit ar integration test, sathe real workflow-e manual QA — ship korar age."
  details: "Automated test jekhane kaje lage sekhane, sathe actual user flow-tao hate kore check kora — shudhu happy path na."
- title: "Deployment"
  icon: "deployment"
  desc: "CI/CD diye ship kora, monitoring soho — jate user tar age issue dhora pore."
  details: "Docker image, CI/CD pipeline (GitHub Actions), staged rollout, ar metrics/tracing shuru theyi wired in — kono incident-er por bolted-on na."
- title: "Handover & Support"
  icon: "handover"
  desc: "Documentation, walkthrough, ar launch-er porew support — drop-and-run na."
  details: "Setup docs, team-er sathe live walkthrough, ar launch-er por bug fix ar chhoto follow-up request-er jonno reachable thaka."
